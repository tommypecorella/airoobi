  <style>
    :root {
      --black: #000;
      --white: #FFF;
      --gold: #B8960C;
      --gray-900: #0d0d0d;
      --gray-800: #1a1a1a;
      --gray-700: #2a2a2a;
      --gray-600: #3a3a3a;
      --gray-400: #888;
      --gray-300: #aaa;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Instrument Sans', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gray-800);
    }
    .topbar-logo img { height: 32px; display: block; }
    .topbar-back {
      color: var(--gray-300);
      text-decoration: none;
      font-size: 0.875rem;
      font-family: 'Instrument Sans', sans-serif;
      transition: color 0.2s;
    }
    .topbar-back:hover { color: var(--gold); }
    .legal-content {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 1.5rem 5rem;
    }
    .legal-content h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      margin-bottom: 32px;
    }
    .legal-content p {
      font-size: 14px;
      line-height: 1.8;
      color: var(--gray-300);
      margin-bottom: 16px;
    }
    .legal-content strong { color: var(--white); }
    .legal-content a { color: var(--gold); }
    .legal-footer {
      border-top: 1px solid var(--gray-800);
      padding: 2rem 1rem;
      text-align: center;
      color: var(--gray-400);
      font-size: 0.85rem;
    }
    .legal-footer a { color: var(--gray-400); text-decoration: none; }
    .legal-footer a:hover { color: var(--gold); }
  </style>
</head>
<body>

  <header class="topbar">
    <a href="https://airoobi.com" class="topbar-logo">
      <img src="/public/images/AIROOBI_Logo_White.png" alt="AIROOBI" height="32">

    <a href="https://airoobi.com" class="topbar-back">&larr; Torna ad AIROOBI</a>

    <p><strong>Comunicazione per gli utenti:</strong> <a href="mailto:hello@airoobi.com">hello@airoobi.com</a></p>
  </main>

  <footer class="legal-footer">
    <p>AIROOBI · <a href="https://airoobi.com">airoobi.com</a></p>
  </footer>

</body>
