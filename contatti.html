  <style>
    :root {
      --black: #FFFFFF;
      --white: #0F1417;
      --gold: #EF3E4F;
      --gray-900: #F5F7FA;
      --gray-800: #F5F7FA;
      --gray-700: #D4DBE3;
      --gray-600: #B4192A;
      --gray-400: #5B6A7D;
      --gray-300: #33404F;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gray-800);
    }
        .topbar-back {
      color: var(--gray-300);
      text-decoration: none;
      font-size: 0.875rem;
      font-family: 'Inter', sans-serif;
      transition: color 0.2s;
    }
    .topbar-back:hover { color: var(--gold); }
    .legal-content {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 1.5rem 5rem;
    }
    .legal-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 14px;
    }
    .legal-content h1 {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-size: clamp(30px, 5vw, 40px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .legal-content h1::after {
      content: '';
      display: block;
      width: 44px;
      height: 3px;
      background: var(--gold);
      border-radius: 2px;
      margin-top: 18px;
      margin-bottom: 26px;
    }
    .legal-content p {
      font-size: 14px;
      line-height: 1.8;
      color: var(--gray-300);
      margin-bottom: 16px;
    }
    .legal-content strong { color: var(--white); }
    .legal-content a { color: var(--gold); }
    .legal-footer {
      border-top: 1px solid var(--gray-800);
      padding: 2rem 1rem;
      text-align: center;
      color: var(--gray-400);
      font-size: 0.85rem;
    }
    .legal-footer a { color: var(--gray-400); text-decoration: none; }
    .legal-footer a:hover { color: var(--gold); }
