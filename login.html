<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#000000;--white:#FFFFFF;--gold:#B8960C;--gold-dim:rgba(184,150,12,.3);--gray-300:#D1D5DB;--gray-400:#9CA3AF;--gray-700:#374151;--gray-800:#1F2937;--aria:#4A9EFF;--kas:#49EACB;--font-h:'Cormorant Garamond',Georgia,serif;--font-b:'Instrument Sans','Helvetica Neue',sans-serif;--font-m:'DM Mono','Courier New',monospace}
html{background:var(--black);color:var(--white);font-family:var(--font-b);-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;background:var(--black)}
.auth-logo-wrap{margin-bottom:32px;text-align:center}
.auth-logo-wrap img{height:36px;filter:invert(1)}
.auth-box{background:var(--gray-800);border:1px solid var(--gray-700);max-width:420px;width:100%;padding:48px 40px;position:relative}
.auth-box h2{font-family:var(--font-h);font-size:28px;font-weight:300;margin-bottom:8px}
.auth-box .auth-sub{font-size:13px;color:var(--gray-400);margin-bottom:32px}
.auth-box label{display:block;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray-400);margin-bottom:6px}
.auth-box input[type="email"],.auth-box input[type="password"]{width:100%;padding:14px 16px;background:var(--black);border:1px solid var(--gray-700);color:var(--white);font-family:var(--font-b);font-size:14px;outline:none;margin-bottom:20px;transition:border-color .3s}
.auth-box input:focus{border-color:var(--gold)}
.auth-btn{width:100%;padding:14px;background:var(--gold);color:var(--black);border:none;font-family:var(--font-b);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .3s;margin-bottom:16px}
.auth-btn:hover{background:var(--white)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-toggle{font-size:13px;color:var(--gray-400);text-align:center}
.auth-toggle a{color:var(--gold);cursor:pointer;text-decoration:none}
.auth-toggle a:hover{text-decoration:underline}
.auth-error{background:rgba(185,28,28,.15);border:1px solid rgba(185,28,28,.3);color:#f87171;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.cf-turnstile-wrap{margin-bottom:16px;display:flex;justify-content:center}
.auth-ad-slot{max-width:728px;width:100%;margin-top:32px;text-align:center;min-height:90px}
.auth-ad-slot-mobile{display:none}
@media(max-width:768px){.auth-ad-slot{display:none}.auth-ad-slot-mobile{display:block;max-width:320px;width:100%;margin-top:24px;text-align:center;min-height:50px}.auth-box{padding:32px 24px}}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--gray-400);font-size:12px;letter-spacing:1px;text-decoration:none;margin-bottom:24px;transition:color .3s}
.back-link:hover{color:var(--gold)}
.it{display:none}.en{display:none}
html[data-lang="it"] .it{display:inline}
html[data-lang="en"] .en{display:inline}
html:not([data-lang]) .it{display:inline}
footer{padding:32px 0;text-align:center;width:100%;margin-top:auto}
.footer-copy{font-size:11px;color:var(--gray-400)}
</style>
</head>
<body>

<a href="/" class="back-link">&larr; <span class="it">Torna su AIROOBI</span><span class="en">Back to AIROOBI</span></a>

<div class="auth-logo-wrap">
  <img src="/public/images/Logo_long_airoobi_transparent.png" alt="AIROOBI">
</div>

<div class="auth-box">
  <h2>Login</h2>
  <p class="auth-sub"><span class="it">Bentornato</span><span class="en">Welcome back</span></p>
  <div class="auth-error" id="login-error"></div>
  <label>Email</label>
  <input type="email" id="login-email" placeholder="email@example.com">
  <label>Password</label>
  <input type="password" id="login-password" placeholder="Password">
  <div class="cf-turnstile-wrap" id="login-turnstile">
    <div class="cf-turnstile" data-sitekey="0x4AAAAAACovg89u9bGYrc0E" data-theme="dark"></div>
  </div>
  <button class="auth-btn" id="login-btn" onclick="doLogin()">Login</button>
  <p class="auth-toggle"><span class="it">Non hai un account?</span><span class="en">Don't have an account?</span> <a href="/signup.html"><span class="it">Registrati</span><span class="en">Sign Up</span></a></p>
</div>

<!-- A-ADS banner 728x90 desktop -->
<div class="auth-ad-slot">
  <iframe data-aa="2429619" src="//ad.a-ads.com/2429619?size=728x90" style="width:728px;height:90px;border:0;padding:0;overflow:hidden;background:transparent"></iframe>

</footer>

<script>
// ── Lang ──
(function(){
  var saved=localStorage.getItem('airoobi_lang');
  if(saved)document.documentElement.setAttribute('data-lang',saved);
})();

function toggleLang(){
  var cur=document.documentElement.getAttribute('data-lang')||'it';
  var next=cur==='it'?'en':'it';
  document.documentElement.setAttribute('data-lang',next);
  localStorage.setItem('airoobi_lang',next);
}

// ── Supabase ──
var SB_URL='https://vuvlmlpuhovipfwtquux.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1dmxtbHB1aG92aXBmd3RxdXV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NjM0MjEsImV4cCI6MjA4ODIzOTQyMX0.5iEqns2F7N6h1VVxLJjqu3Rm4doOVDs5hpD8sNaL6co';

async function sbAuth(endpoint,body){
  var res=await fetch(SB_URL+'/auth/v1/'+endpoint,{method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify(body)});
  return {status:res.status,data:await res.json()};
}

function saveSession(s){localStorage.setItem('airoobi_session',JSON.stringify(s))}
function getSession(){try{return JSON.parse(localStorage.getItem('airoobi_session'))}catch(e){return null}}

// ── Tracking ──
async function track(event,props){
  try{
    var lang=document.documentElement.getAttribute('data-lang')||'it';
    var payload={event_type:event,page:location.pathname,referrer:document.referrer,lang:lang,user_agent:navigator.userAgent,props:JSON.stringify(props||{})};
    var s=getSession();if(s&&s.user)payload.user_id=s.user.id;
    fetch(SB_URL+'/rest/v1/events',{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(payload)}).catch(function(){});
  }catch(e){}
}

// ── Turnstile ──
function getTurnstileToken(formId){
  var container=document.getElementById(formId);
  if(!container)return null;
  var input=container.querySelector('[name="cf-turnstile-response"]');
  return input?input.value:null;
}

// ── Helpers ──
function showError(id,msg){var e=document.getElementById(id);e.innerHTML=msg;e.style.display='block'}

// ── Login ──
async function doLogin(){
  document.getElementById('login-error').style.display='none';
  var email=document.getElementById('login-email').value.trim();
  var pw=document.getElementById('login-password').value;
  var lang=document.documentElement.getAttribute('data-lang')||'it';

  if(!email)return showError('login-error',lang==='it'?'Inserisci email':'Enter email');
  if(!pw)return showError('login-error',lang==='it'?'Inserisci password':'Enter password');

  var turnstileToken=getTurnstileToken('login-turnstile');
  if(!turnstileToken){
    return showError('login-error',lang==='it'?'Completa la verifica anti-bot.':'Complete the anti-bot verification.');
  }

  document.getElementById('login-btn').disabled=true;
  var result=await sbAuth('token?grant_type=password',{email:email,password:pw});
  var status=result.status;var data=result.data;

  if(status===200&&data.access_token){
    if(!data.user.email_confirmed_at){
      track('login_email_not_confirmed',{lang:lang});
      var errEl=document.getElementById('login-error');
      errEl.style.display='block';
      errEl.style.color='#B8960C';
      errEl.innerHTML=(lang==='it'
        ?'Controlla la tua email per confermare l\'account.<br>Hai ricevuto: <strong>'+email+'</strong>'
        :'Check your email to confirm your account.<br>Sent to: <strong>'+email+'</strong>')
        +'<br><button id="resend-confirm-btn" style="margin-top:10px;padding:8px 18px;background:#B8960C;color:#000;border:none;cursor:pointer;font-weight:600;letter-spacing:1px">'
        +(lang==='it'?'Reinvia email di conferma':'Resend confirmation email')+'</button>';
      document.getElementById('resend-confirm-btn').onclick=async function(){
        this.disabled=true;
        this.textContent=lang==='it'?'Invio in corso...':'Sending...';
        await sbAuth('resend',{type:'signup',email:email});
        this.textContent=lang==='it'?'Email reinviata':'Email resent';
      };
    }else{
      // Success — save session and redirect to main
      saveSession(data);
      track('login',{lang:lang});
      window.location.href='/';
    }
  }else{
    var msg=data.error_description||data.msg||data.message||'';
    if(msg.toLowerCase().includes('email not confirmed')){
      track('login_email_not_confirmed',{lang:lang});
      showError('login-error',lang==='it'?'Devi confermare la tua email prima di accedere. Controlla la tua casella di posta.':'You must confirm your email before logging in. Check your inbox.');
    }else{
      track('login_error',{lang:lang});
      showError('login-error',lang==='it'?'Email o password errati':'Wrong email or password');
    }
  }
  document.getElementById('login-btn').disabled=false;
}

// ── Enter key ──
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var active=document.activeElement;
    if(active&&(active.id==='login-email'||active.id==='login-password'))doLogin();
  }
});

// ── Track pageview ──
track('pageview',{page:'login'});
</script>
</body>
</html>
