<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Pagina non trovata — AIROOBI</title>
<link rel="icon" type="image/png" href="/public/images/AIROOBI_Symbol_Black.png?v=3.0.0">
<style>
:root{--bg:#FAFAF7;--ink:#0F1417;--muted:#5B6670;--accent:#E05252;--card:#FFFFFF;--line:#E3E1DA}
html[data-theme="dark"]{--bg:#161D24;--ink:#F2F5F8;--muted:#9AA7B2;--card:#1D2630;--line:#2A3540}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Space Grotesk','Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:520px;width:100%;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:48px 32px}
.logo{width:56px;height:56px;margin:0 auto 20px;display:block}
h1{font-size:64px;line-height:1;letter-spacing:-2px}
h1 em{color:var(--accent);font-style:italic}
h2{font-size:20px;margin:10px 0 8px}
p{color:var(--muted);font-size:15px;line-height:1.5;margin-bottom:28px}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a.btn{display:inline-block;padding:12px 22px;border-radius:12px;font-size:13px;letter-spacing:1px;font-weight:700;text-decoration:none;text-transform:uppercase}
a.primary{background:var(--accent);color:#fff}
a.ghost{border:1px solid var(--line);color:var(--ink)}
html[data-theme="dark"] .logo{filter:invert(1)}
</style>
<script>try{if(localStorage.getItem('airoobi-theme')==='dark')document.documentElement.setAttribute('data-theme','dark')}catch(e){}</script>
</head>
<body>
<main class="card">
  <img class="logo" src="/public/images/AIROOBI_Symbol_Black.png?v=3.0.0" alt="AIROOBI">
  <h1>4<em>0</em>4</h1>
  <h2>Questa pagina non esiste</h2>
  <p>Il link potrebbe essere vecchio o scritto male. Nessun problema: la corsa continua da qui.</p>
  <div class="actions">
    <a class="btn primary" href="/esplora">Vai agli airdrop</a>
    <a class="btn ghost" href="/">Home</a>
  </div>
</main>
</body>
</html>
