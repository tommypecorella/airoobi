<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoga Live Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root{
  --sage:#7a9e87;--sage-l:#b5d0be;--sage-d:#4a7a5c;
  --earth:#c4a882;--deep:#2c3e35;--cream:#f5f0e8;
  --accent:#d4895a;--muted:#8a9e93;
  --eve-bg:#141e2e;--eve-sage:#5a9a7e;--eve-txt:#c2d4dc;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Jost',sans-serif;font-weight:300}
body{color:var(--deep);background:#1a1a1a}
body.eve{color:var(--eve-txt)}

/* FULL BLEED BACKGROUND PHOTO */
#bg-photo{
  position:fixed;inset:0;z-index:0;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  transition:opacity .8s ease;
}
#bg-overlay{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(135deg,rgba(245,240,232,.96) 0%,rgba(240,233,220,.94) 50%,rgba(235,226,210,.92) 100%);
}
body.eve #bg-overlay{
  background:linear-gradient(135deg,rgba(20,30,46,.97) 0%,rgba(16,24,40,.96) 60%,rgba(12,20,36,.95) 100%);
}

/* PROGRESS */
#pbar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--sage),var(--accent));z-index:100;transition:width .7s ease}
body.eve #pbar{background:linear-gradient(90deg,var(--eve-sage),#6a9ec8)}

/* HUD */
#hud{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:12px 24px 0;z-index:100;pointer-events:none}
#pose-idx{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--muted)}
#sess-lbl{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:2px;color:var(--sage);font-style:italic}
body.eve #pose-idx{color:#5a7888}
body.eve #sess-lbl{color:var(--eve-sage)}
#total-clock{font-size:9px;letter-spacing:2px;color:var(--muted);display:none}
body.eve #total-clock{color:#5a7888}

/* SLIDES */
#slides{position:fixed;inset:0;z-index:2}
.slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:55px 56px 90px;opacity:0;pointer-events:none;transition:opacity .65s ease}
.slide.on{opacity:1;pointer-events:all}

/* INTRO */
.s-intro{flex-direction:column;text-align:center;gap:0}
.big-t{font-family:'Cormorant Garamond',serif;font-size:clamp(76px,12vw,144px);font-weight:300;letter-spacing:.38em;line-height:.9;color:var(--deep)}
body.eve .big-t{color:var(--eve-txt)}
.tag{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(15px,1.8vw,21px);color:var(--sage);letter-spacing:.12em;margin:18px 0 44px}
body.eve .tag{color:var(--eve-sage)}
.div-line{width:90px;height:1px;background:linear-gradient(90deg,transparent,var(--sage-l),transparent);margin:0 auto 36px}
.sess-info{font-size:12px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;line-height:2.4}

/* POSE GRID — photo LEFT, info RIGHT */
.s-pose{display:grid;grid-template-columns:320px 1fr;gap:52px;max-width:1000px;width:100%;align-items:center}
@media(max-width:750px){.s-pose{grid-template-columns:1fr}.photo-col{display:none}}

/* PHOTO COLUMN */
.photo-col{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;position:relative}
.photo-frame{
  width:100%;max-width:300px;
  border-radius:8px;
  overflow:hidden;
  position:relative;
  box-shadow:0 16px 48px rgba(44,62,53,.18),0 4px 12px rgba(44,62,53,.08);
  animation:photoIn .7s cubic-bezier(.34,1.4,.64,1) both;
}
body.eve .photo-frame{box-shadow:0 16px 48px rgba(0,0,0,.5),0 4px 12px rgba(0,0,0,.3)}
@keyframes photoIn{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:none}}
.photo-frame img{
  width:100%;height:auto;display:block;
  object-fit:cover;
}
.photo-frame::after{
  content:'';position:absolute;inset:0;
  border-radius:8px;
  border:1px solid rgba(122,158,135,.15);
  pointer-events:none;
}
.pose-badge{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:13px;letter-spacing:1.5px;color:var(--muted);
  text-align:center;
}
body.eve .pose-badge{color:#5a7888}

/* INFO COLUMN */
.info-col{}
.pose-meta{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
body.eve .pose-meta{color:#5a7888}
.pose-nm{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,4vw,50px);font-weight:300;line-height:1.05;margin-bottom:3px}
.pose-ita{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--sage);font-size:15px;margin-bottom:14px}
body.eve .pose-ita{color:var(--eve-sage)}
.chip{display:inline-block;background:var(--sage);color:#fff;font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:14px}
body.eve .chip{background:var(--eve-sage)}
.desc{font-size:clamp(11px,1.1vw,13px);line-height:1.95;color:#5a6e63;margin-bottom:22px}
body.eve .desc{color:#7a9a90}

/* BIG TIMER */
.timer-wrap{display:flex;align-items:center;gap:28px}
.timer-ring-container{
  position:relative;width:150px;height:150px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.6);border-radius:50%;
  backdrop-filter:blur(4px);
}
body.eve .timer-ring-container{background:rgba(20,30,46,.6)}
.timer-svg{position:absolute;inset:0;transform:rotate(-90deg)}
.t-bg{fill:none;stroke:rgba(0,0,0,.07);stroke-width:5}
body.eve .t-bg{stroke:rgba(255,255,255,.07)}
.t-arc{fill:none;stroke:var(--sage);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
body.eve .t-arc{stroke:var(--eve-sage)}
.t-arc.urgent{stroke:var(--accent)!important;animation:urgentPulse .5s ease-in-out infinite alternate}
@keyframes urgentPulse{from{opacity:1}to{opacity:.6}}
.t-num{
  font-family:'Cormorant Garamond',serif;font-size:62px;font-weight:300;
  line-height:1;position:relative;z-index:1;color:var(--deep);
  text-shadow:0 2px 8px rgba(44,62,53,.1);
}
body.eve .t-num{color:var(--eve-txt)}
.t-sec{position:absolute;bottom:18px;left:0;right:0;text-align:center;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.timer-side{display:flex;flex-direction:column;gap:10px}
.timer-lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.auto-pill{
  display:inline-flex;align-items:center;gap:8px;padding:9px 18px;
  border-radius:20px;border:1px solid rgba(122,158,135,.35);
  font-size:10px;letter-spacing:2px;color:var(--muted);
  cursor:pointer;transition:all .3s;background:none;
  white-space:nowrap;font-family:'Jost',sans-serif;font-weight:300
}
.auto-pill:hover{border-color:var(--sage);color:var(--sage)}
.auto-pill.on{background:var(--sage);border-color:var(--sage);color:#fff}
.auto-pill .adot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.5;transition:all .3s}
.auto-pill.on .adot{opacity:1;animation:pulse-dot 1s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
body.eve .auto-pill{border-color:rgba(90,154,126,.3);color:#5a7888}
body.eve .auto-pill.on{background:var(--eve-sage);border-color:var(--eve-sage);color:#fff}
.kbd-hint{font-size:9px;letter-spacing:1px;color:var(--muted);line-height:1.9;margin-top:2px}
body.eve .kbd-hint{color:#4a6880}
.kbd-hint span{color:var(--sage);font-weight:400}
body.eve .kbd-hint span{color:var(--eve-sage)}

/* CONTROLS */
#ctrl{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;z-index:100}
.btn{background:none;border:1px solid rgba(122,158,135,.35);color:var(--sage-d);font-family:'Jost',sans-serif;font-weight:300;font-size:10px;letter-spacing:3px;text-transform:uppercase;padding:11px 22px;border-radius:30px;cursor:pointer;transition:all .3s;white-space:nowrap;backdrop-filter:blur(4px);background:rgba(255,255,255,.5)}
.btn:hover{background:var(--sage);border-color:var(--sage);color:#fff}
.btn.pri{background:var(--sage);border-color:var(--sage);color:#fff;padding:13px 34px;font-size:11px}
.btn.pri:hover{background:var(--sage-d)}
body.eve .btn{border-color:rgba(90,154,126,.35);color:var(--eve-sage);background:rgba(20,30,46,.5)}
body.eve .btn:hover,.body.eve .btn.pri{background:var(--eve-sage);border-color:var(--eve-sage);color:#fff}
body.eve .btn.pri{background:var(--eve-sage);border-color:var(--eve-sage)}

/* MUSIC BTN */
#mbtn{position:fixed;bottom:22px;right:22px;width:42px;height:42px;border-radius:50%;border:1px solid rgba(122,158,135,.3);background:rgba(255,255,255,.5);color:var(--muted);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:100;transition:all .3s;backdrop-filter:blur(4px)}
#mbtn:hover{border-color:var(--sage);color:var(--sage)}
#mbtn.on{background:var(--sage);border-color:var(--sage);color:#fff}
body.eve #mbtn{border-color:rgba(90,154,126,.25);color:#5a7888;background:rgba(20,30,46,.5)}
body.eve #mbtn.on{background:var(--eve-sage);border-color:var(--eve-sage);color:#fff}

/* BREATH INDICATOR */
#breath{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;z-index:50;opacity:0;transition:opacity .5s}
#breath.on{opacity:1}
.b-dot{width:7px;height:7px;border-radius:50%;background:var(--sage-l);animation:bdot 4.5s ease-in-out infinite}
.b-txt{font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--muted)}
@keyframes bdot{0%,100%{transform:scale(1);opacity:.35}50%{transform:scale(2.4);opacity:1}}

/* NOTIFICATION */
#notif{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);background:rgba(44,62,53,.93);color:#fff;font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;padding:16px 42px;border-radius:4px;opacity:0;transition:all .4s ease;pointer-events:none;z-index:300;text-align:center;white-space:nowrap}
#notif.on{opacity:1;transform:translate(-50%,-50%) scale(1)}
body.eve #notif{background:rgba(10,18,36,.93);color:var(--eve-txt)}

/* END */
#end{display:none;position:fixed;inset:0;background:var(--deep);z-index:200;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px}
#end.on{display:flex}
body.eve #end{background:#0d1524}
#end .big-t{color:var(--sage-l);letter-spacing:.25em}
body.eve #end .big-t{color:#7aaabb}
#end .elapsed{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin:20px 0 16px}
#end p{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--earth);font-size:clamp(14px,1.7vw,19px);letter-spacing:.08em;margin-bottom:44px;line-height:1.8}

/* DECO CORNERS */
.dco{position:fixed;opacity:.1;pointer-events:none;z-index:3}
.dco-tl{top:16px;left:16px}
.dco-br{bottom:16px;right:16px;transform:rotate(180deg)}
</style>
</head>

<div id="bg-photo"></div>
<div id="bg-overlay"></div>

<svg class="dco dco-tl" width="65" height="65" viewBox="0 0 65 65"><path d="M7,58 Q7,7 58,7" stroke="#7a9e87" stroke-width="1.2" fill="none"/><circle cx="7" cy="58" r="2" fill="#7a9e87"/><circle cx="58" cy="7" r="2" fill="#7a9e87"/></svg>
<svg class="dco dco-br" width="65" height="65" viewBox="0 0 65 65"><path d="M7,58 Q7,7 58,7" stroke="#7a9e87" stroke-width="1.2" fill="none"/><circle cx="7" cy="58" r="2" fill="#7a9e87"/><circle cx="58" cy="7" r="2" fill="#7a9e87"/></svg>

<div id="pbar"></div>

const POSES=[
{type:'intro'},
{type:'guide'},
{name:"Child's Pose",ita:"Posa del Bambino",desc:"Inginocchiati con le ginocchia larghe e i pollici dei piedi a toccarsi. Cammina con le mani in avanti finché la fronte non poggia sul pavimento. Pratica respiri profondi e regolari, lasciando andare ogni distrazione.",reps:"3–5 respiri",secs:45},
{name:"Tabletop",ita:"Posizione del Tavolo",desc:"Alzati a quattro zampe con spalle sui polsi e fianchi sulle ginocchia. Distribuisci il peso uniformemente, attiva gli addominali e allunga la colonna. Sguardo verso il basso.",reps:"30 secondi",secs:30},
{name:"Cat Pose",ita:"Posa del Gatto",desc:"Premi le mani per arrotondare la schiena verso l'alto come se un filo tirasse la schiena al soffitto. Abbassa la testa e porta il mento al petto, portando il ventre verso la colonna vertebrale.",reps:"5 respiri",secs:35},
{name:"Cow Pose",ita:"Posa della Mucca",desc:"Abbassa il ventre e solleva il petto. Rimani radicata attraverso le mani, allarga le spalle e alza lo sguardo. Alterna tra Gatto e Mucca due o tre volte seguendo il ritmo del respiro.",reps:"2–3 alternanze",secs:45},
{name:"Downward Facing Dog",ita:"Cane a Faccia in Giù",desc:"Cammina con le mani avanti, porta le dita dei piedi sotto e solleva i fianchi verso l'alto. Le gambe mantengono una leggera piega. Allunga la colonna e premi tutte le dita a terra uniformemente.",reps:"3–5 respiri",secs:45},
{name:"Forward Fold",ita:"Piegamento in Avanti",desc:"Cammina lentamente con i piedi verso le mani. Con una leggera piega alle ginocchia, abbassa la testa verso il suolo, il ventre verso le cosce. Lascia le braccia pendere e rilassa completamente la cervicale.",reps:"pochi respiri",secs:35},
{name:"Halfway Lift",ita:"Mezzo Sollevamento",desc:"Inspira, porta le mani sugli stinchi e solleva le spalle in linea con i fianchi. Il corpo forma un angolo retto. Impegna il core e apri il petto. Espira per tornare al piegamento e ripeti.",reps:"2–3 ripetizioni",secs:25},
{name:"Tadasana",ita:"Posa della Montagna",desc:"Porta le braccia verso il cielo, stai alta. Peso uguale su entrambi i piedi, gambe forti, core attivo. Ammorbidisci le spalle. Il corpo è una lunga linea di energia: testa, spalle, fianchi, talloni.",reps:"3–5 respiri",secs:35},
{name:"Side Stretch",ita:"Allungamento Laterale",desc:"Espira per allungarti su un lato mantenendo il peso uguale su entrambi i piedi. Torna al centro, poi allunga sull'altro lato. Addominali impegnati. Totale: 3 allungamenti per lato.",reps:"3 × per lato",secs:45},
{name:"Mini Backbend",ita:"Mini Piegamento Indietro",desc:"Piega i gomiti ai lati a livello delle spalle come un palo del gol. Solleva petto e mento verso l'alto mantenendo core forte. Disegna le spalle giù lungo la schiena e apri il cuore al soffitto.",reps:"1–2 respiri",secs:20},
{name:"Plank",ita:"Posa della Tavola",desc:"Da Tadasana, piegati avanti e porta il corpo in posizione di plank. Mani a larghezza delle spalle, piedi uniti. Spalle sopra i gomiti, sopra i polsi. Attiva tutto: addominali, gambe, braccia.",reps:"3–5 respiri",secs:40},
{name:"Low Cobra",ita:"Cobra Basso",desc:"Abbassati sul ventre, mani ai lati vicino alle costole basse. Inspira e solleva il petto di qualche centimetro alleggerendo le mani. Sguardo in basso, collo lungo, spalle lontane dalle orecchie.",reps:"3–5 respiri",secs:35},
{name:"Downward Dog — Leg Lift",ita:"Cane Giù con Sollevamento Gamba",desc:"Dal cane a faccia in giù, solleva una gamba con intenzione tenendo il piede flesso verso il basso per mantenere i fianchi livellati. Premi mani e braccia uniformemente. Poi cambia lato.",reps:"pochi respiri × lato",secs:55},
{name:"Low Lunge",ita:"Affondo Basso",desc:"Inspira e solleva la gamba in alto, poi espira portando il piede tra le mani. Dita circondano il piede davanti, il ventre si solleva lontano dalla coscia. Strizza la gamba posteriore e mantieni il tallone sopra le dita.",reps:"3–5 respiri",secs:45},
{name:"Warrior II",ita:"Guerriero II",desc:"Espira per girare il tallone posteriore verso il basso. Inspira alzando il busto mentre le braccia si aprono a livello delle spalle. Il ginocchio anteriore direttamente sopra la caviglia. Guarda oltre la mano anteriore con intensità.",reps:"3–5 respiri",secs:45},
{name:"Extended Side Angle",ita:"Angolo Laterale Esteso",desc:"Alla prossima espirazione, porta il gomito anteriore all'interno della gamba piegata. Mantieni la metà inferiore come nel Guerriero II. Solleva il braccio opposto aprendo il petto e creando una lunga linea.",reps:"3–5 respiri",secs:45},
{name:"Side Plank",ita:"Plank Laterale",desc:"Dal plank alto, sposta il peso su un lato e solleva la mano e il piede opposti alzando i fianchi. Usa il core per sostenere il peso. Lo sguardo può essere verso il basso, di lato o verso l'alto. Poi cambia lato.",reps:"qualche respiro",secs:35},
{name:"Chaturanga",ita:"Chaturanga Dandasana",desc:"Dal plank, sposta leggermente le spalle avanti e scendi finché i gomiti non raggiungono i 90 gradi. Evita di scendere oltre per proteggere le articolazioni. Core sempre impegnato.",reps:"transizione",secs:20},
{name:"Upward Facing Dog",ita:"Cane a Faccia in Su",desc:"Inspira e premi le mani per sollevare le spalle. Porta il petto avanti mentre ventre, cosce e ginocchia si staccano dal pavimento. Solo palmi e dorsi dei piedi toccano il suolo.",reps:"1–2 respiri",secs:25},
{name:"Chair Pose",ita:"Posa della Sedia",desc:"Dal cane giù, porta i piedi alle mani. Inspira per il mezzo sollevamento, espira avanti. Inspira per trovare la sedia: fianchi in giù e indietro, piedi a larghezza dei fianchi, braccia in alto.",reps:"3–5 respiri",secs:35},
{name:"Prayer Twist",ita:"Torsione della Preghiera",desc:"Mani al centro del cuore con i palmi uniti. Mantieni la metà inferiore come nella sedia. Ruota verso destra connettendo il gomito sinistro all'esterno del ginocchio destro. Poi ripeti sull'altro lato.",reps:"pochi respiri × lato",secs:50},
{name:"Tree Pose",ita:"Posa dell'Albero",desc:"Dalla sedia, alzati e sposta il peso su un piede. Piega il ginocchio e porta il piede all'interno del polpaccio o della coscia — mai sul ginocchio! Braccia in alto. Poi cambia lato.",reps:"qualche respiro × lato",secs:55},
{name:"Horse Pose",ita:"Posa del Cavallo",desc:"Allarga i piedi, ruota le dita verso l'esterno. Piega le ginocchia abbassando il bacino, spingendole verso i mignoli dei piedi. Mantieni spalle sopra i fianchi e continua a scendere.",reps:"2–3 respiri",secs:35},
{name:"Wide Legged Forward Fold",ita:"Piegamento con Gambe Larghe",desc:"Alzati dalla posa del cavallo e gira piedi e ginocchia avanti. Con la colonna lunga, abbassa il busto sopra le cosce. Le braccia possono afferrare i gomiti opposti o pendere verso il suolo. Respira profondamente.",reps:"respiri profondi",secs:40},
{name:"Camel Pose",ita:"Posa del Cammello",desc:"Stai in ginocchio a larghezza dei fianchi. Palme all'osso sacro. Con il ventre forte, premi i fianchi avanti mentre il petto si solleva al soffitto. Su ogni inspirazione solleva il petto, su ogni espirazione spingi i fianchi avanti.",reps:"3–5 respiri",secs:45},
{name:"Seated Forward Fold",ita:"Piegamento Seduto in Avanti",desc:"Porta le gambe davanti a te. Piega i piedi verso il viso e siediti dritta. Inspira le braccia in alto, poi piegati in avanti sulle gambe. Addominali attivi, linea dritta dalla testa al coccige. Inspira per allungare.",reps:"respiri lenti",secs:45},
{name:"Boat Pose",ita:"Posa della Barca",desc:"Abbraccia le ginocchia al petto e rotola verso il coccige finché senti gli addominali attivarsi. Piega le ginocchia o solleva i talloni in linea con le ginocchia. Porta le dita verso i talloni, apri il petto.",reps:"3 respiri",secs:35},
{name:"Seated Twist",ita:"Torsione Seduta",desc:"Gambe di nuovo lunghe, incrocia un piede sopra il ginocchio opposto. Siediti dritta, porta una mano dietro per il supporto. Inspira per allungarti, espira per ruotare lentamente portando il gomito opposto al ginocchio.",reps:"pochi respiri × lato",secs:55},
{name:"Easy Pose",ita:"Posizione Semplice — Meditazione",desc:"Trova una posizione comoda a gambe incrociate. La colonna è lunga, le spalle si ammorbidiscono lontano dalle orecchie. Poggia il dorso delle mani sulle cosce, palmi verso l'alto. Chiudi gli occhi. Gratitudine.",reps:"meditazione finale",secs:100}
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let cur=0,tLeft=0,tTotal=0,tRun=false,tIv=null;
let autoAdv=false;
let totalSec=0,sessStart=null;
const CIRC=2*Math.PI*62;

// ══════════════════════════════════════════════
// SESSION
// ══════════════════════════════════════════════
function detectSess(){
  const h=new Date().getHours();
  const eve=h>=16||h<5;
  if(eve)document.body.classList.add('eve');
  document.getElementById('sess-lbl').textContent=eve?'🌙 sessione serale':'☀️ sessione mattutina';
  // Set background
  document.getElementById('bg-photo').style.backgroundImage=`url(${BG_SRC})`;
}

// ══════════════════════════════════════════════
// BUILD SLIDES
// ══════════════════════════════════════════════
function buildSlides(){
  const wrap=document.getElementById('slides');
  POSES.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='slide';div.id=`sl-${i}`;

    if(p.type==='intro'){
      div.classList.add('s-intro');
      const eve=document.body.classList.contains('eve');
      div.innerHTML=`
        <div class="big-t">YOGA</div>
        <div class="div-line"></div>
        <div class="tag">breathe · flow · be</div>
        <div class="sess-info">
          ${eve?'sessione serale · rilassamento profondo':'sessione mattutina · energia per la giornata'}<br>
          15–20 minuti · 30 posizioni
        </div>`;
    } else if(p.type==='guide'){
      div.classList.add('s-intro');
      div.innerHTML=`
        <div style="max-width:560px;text-align:center">
          <div style="font-family:'Cormorant Garamond',serif;font-size:clamp(26px,4vw,40px);font-weight:300;margin-bottom:16px;">Come usare la guida</div>
          <div class="div-line"></div>
          <div style="font-size:clamp(12px,1.2vw,15px);line-height:2.4;color:#5a6e63" class="desc">
            Premi <strong style="color:var(--sage);font-weight:400">START</strong> su ogni posa per avviare il timer.<br>
            Attiva <strong style="color:var(--sage);font-weight:400">Auto ▶</strong> per non alzarti mai dal tappetino.<br>
            Premi <strong style="color:var(--sage);font-weight:400">♪</strong> per la musica ambient.<br>
            Naviga con <strong style="color:var(--sage);font-weight:400">← →</strong> da tastiera o con i pulsanti.<br><br>
            <em style="font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--sage)">Buona pratica ✦</em>
          </div>
        </div>`;
    } else {
      div.classList.add('s-pose');
      const imgSrc=IMGS[i]||null;
      div.innerHTML=`
        <div class="photo-col">
          ${imgSrc?`<div class="photo-frame" id="frame-${i}"><img src="${imgSrc}" alt="${p.name}" loading="lazy"/></div>`:''}
          <div class="pose-badge">${p.ita}</div>
        </div>
        <div class="info-col">
          <div class="pose-meta">Posizione ${i-1} di ${POSES.length-2}</div>
          <div class="pose-nm">${p.name}</div>
          <div class="pose-ita">${p.ita}</div>
          <span class="chip">${p.reps}</span>
          <div class="desc">${p.desc}</div>
          <div class="timer-lbl">timer</div>
          <div class="timer-wrap">
            <div class="timer-ring-container">
              <svg class="timer-svg" viewBox="0 0 140 140">
                <circle class="t-bg" cx="70" cy="70" r="62"/>
                <circle class="t-arc" id="ta-${i}" cx="70" cy="70" r="62"
                  stroke-dasharray="${CIRC.toFixed(2)}" stroke-dashoffset="0"/>
              </svg>
              <div class="t-num" id="tn-${i}">${p.secs}</div>
              <div class="t-sec">sec</div>
            </div>
            <div class="timer-side">
              <button class="auto-pill" id="apill-${i}" onclick="toggleAuto()">
                <span class="adot"></span>
                <span class="apill-lbl">Auto ▶</span>
              </button>
              <div class="kbd-hint">
                <span>SPACE</span> start<br>
                <span>A</span> auto · <span>M</span> musica
              </div>
            </div>
          </div>
        </div>`;
    }
    wrap.appendChild(div);
  });
}

// ══════════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════════
function startTimer(){
  if(tRun){pauseTimer();return;}
  if(!sessStart)sessStart=Date.now();
  if(tLeft<=0)tLeft=POSES[cur].secs;
  tTotal=POSES[cur].secs;
  tRun=true;
  document.getElementById('breath').classList.add('on');
  document.getElementById('total-clock').style.display='block';
  clearInterval(tIv);
  tIv=setInterval(()=>{
    tLeft--;totalSec++;
    updateTimer();updateClock();
    if(tLeft<=0){
      clearInterval(tIv);tRun=false;
      document.getElementById('breath').classList.remove('on');
      playChime();notify('✓ Ottimo!');
      setTimeout(()=>{if(cur<POSES.length-1)goTo(cur+1);},1700);
    }
  },1000);
  buildCtrl();
}

function pauseTimer(){
  clearInterval(tIv);tRun=false;
  document.getElementById('breath').classList.remove('on');
  buildCtrl();
}

function resetTimer(){
  clearInterval(tIv);tRun=false;
  document.getElementById('breath').classList.remove('on');
  tLeft=POSES[cur].secs||0;tTotal=tLeft;
  updateTimer();buildCtrl();
}

function updateTimer(){
  const tn=document.getElementById(`tn-${cur}`);
  const ta=document.getElementById(`ta-${cur}`);
  if(!tn||!ta)return;
  tn.textContent=tLeft;
  const prog=tTotal>0?tLeft/tTotal:1;
  ta.style.strokeDashoffset=CIRC*(1-prog);
  ta.classList.toggle('urgent',tLeft<=5);
}

function updateClock(){
  const m=Math.floor(totalSec/60),s=String(totalSec%60).padStart(2,'0');
  document.getElementById('total-clock').textContent=m+':'+s;
}

// ══════════════════════════════════════════════
// AUTO-ADVANCE
// ══════════════════════════════════════════════
function toggleAuto(){
  autoAdv=!autoAdv;
  syncAutoPills();
  notify(autoAdv?'Auto avanzamento ON ▶':'Auto avanzamento OFF');
  if(autoAdv&&!tRun&&POSES[cur].secs)startTimer();
}

function syncAutoPills(){
  document.querySelectorAll('.auto-pill').forEach(el=>{
    el.classList.toggle('on',autoAdv);
    el.querySelector('.apill-lbl').textContent=autoAdv?'Auto ◼':'Auto ▶';
  });
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function goTo(n){
  if(n<0||n>=POSES.length)return;
  clearInterval(tIv);tRun=false;
  document.getElementById('breath').classList.remove('on');
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('on'));
  cur=n;
  document.getElementById(`sl-${n}`).classList.add('on');
  // Re-trigger photo animation
  const fr=document.getElementById(`frame-${n}`);
  if(fr){fr.style.animation='none';void fr.offsetWidth;fr.style.animation='photoIn .7s cubic-bezier(.34,1.4,.64,1) both';}
  const p=POSES[n];
  tLeft=p.secs||0;tTotal=p.secs||0;
  updateTimer();
  document.getElementById('pbar').style.width=((n/(POSES.length-1))*100)+'%';
  const pi=n>1?`${n-1} · ${POSES.length-2}`:(n===0?'intro':'guida');
  document.getElementById('pose-idx').textContent=pi;
  syncAutoPills();
  if(autoAdv&&p.secs)setTimeout(startTimer,800);
  buildCtrl();
}

function buildCtrl(){
  const p=POSES[cur],c=document.getElementById('ctrl');
  let h='';
  if(cur>0)h+=`<button class="btn" onclick="goTo(${cur-1})">← Indietro</button>`;
  if(p.secs){
    const lbl=tRun?'Pausa':tLeft<(p.secs||0)&&tLeft>0?'Riprendi':'Start';
    h+=`<button class="btn pri" onclick="startTimer()">${lbl}</button>`;
    if(!tRun)h+=`<button class="btn" onclick="resetTimer()">Reset</button>`;
  }
  if(cur<POSES.length-1){
    const lbl=(p.type==='intro'||p.type==='guide')?'Avanti →':'Prossima →';
    h+=`<button class="btn${!p.secs?' pri':''}" onclick="goTo(${cur+1})">${lbl}</button>`;
  } else {
    h+=`<button class="btn pri" onclick="finish()">Completa ✓</button>`;
  }
  c.innerHTML=h;
}

function finish(){
  document.getElementById('end').classList.add('on');
  const m=Math.floor(totalSec/60),s=String(totalSec%60).padStart(2,'0');
  document.getElementById('el-time').textContent=`tempo praticato: ${m}:${s}`;
}

function restart(){
  document.getElementById('end').classList.remove('on');
  totalSec=0;sessStart=null;autoAdv=false;syncAutoPills();
  document.getElementById('total-clock').style.display='none';
  goTo(0);
}

// ══════════════════════════════════════════════
// NOTIFICATION
// ══════════════════════════════════════════════
let nTm=null;
function notify(msg){
  const el=document.getElementById('notif');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(nTm);nTm=setTimeout(()=>el.classList.remove('on'),1600);
}

// ══════════════════════════════════════════════
// AMBIENT AUDIO
// ══════════════════════════════════════════════
let actx=null,mgain=null,musicOn=false;
function initAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  mgain=actx.createGain();mgain.gain.value=0;mgain.connect(actx.destination);
  [65.4,98.0,130.8,164.8,196.0,261.6,329.6,392.0,523.3].forEach((f,i)=>{
    const osc=actx.createOscillator(),g=actx.createGain(),flt=actx.createBiquadFilter();
    osc.type='sine';osc.frequency.value=f;osc.detune.value=(i%2?5:-5)+Math.random()*3;
    g.gain.value=0.025/(i*.7+1);flt.type='lowpass';flt.frequency.value=900;flt.Q.value=0.7;
    osc.connect(flt);flt.connect(g);g.connect(mgain);osc.start();
  });
  const lfo=actx.createOscillator(),lg=actx.createGain();
  lfo.frequency.value=0.035;lg.gain.value=0.006;lfo.connect(lg);lfo.start();
  const buf=actx.createBuffer(1,actx.sampleRate*3,actx.sampleRate);
  const d=buf.getChannelData(0);for(let k=0;k<d.length;k++)d[k]=Math.random()*2-1;
  const ns=actx.createBufferSource();ns.buffer=buf;ns.loop=true;
  const nf=actx.createBiquadFilter();nf.type='bandpass';nf.frequency.value=220;nf.Q.value=5;
  const ng=actx.createGain();ng.gain.value=0.009;
  ns.connect(nf);nf.connect(ng);ng.connect(mgain);ns.start();
}
function toggleMusic(){
  if(!actx)initAudio();
  musicOn=!musicOn;
  const now=actx.currentTime;
  mgain.gain.cancelScheduledValues(now);
  mgain.gain.setValueAtTime(mgain.gain.value,now);
  mgain.gain.linearRampToValueAtTime(musicOn?.26:0,now+2.5);
  const b=document.getElementById('mbtn');
  b.classList.toggle('on',musicOn);b.textContent=musicOn?'♫':'♪';
}
function playChime(){
  if(!actx||!musicOn)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine';o.frequency.value=523.3;
  g.gain.setValueAtTime(0,actx.currentTime);
  g.gain.linearRampToValueAtTime(.12,actx.currentTime+.05);
  g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+1.4);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+1.5);
}

// ══════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();goTo(cur+1)}
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();goTo(cur-1)}
  else if(e.key===' '){e.preventDefault();if(POSES[cur].secs)startTimer()}
  else if(e.key==='a'||e.key==='A')toggleAuto();
  else if(e.key==='m'||e.key==='M')toggleMusic();
});
document.getElementById('mbtn').addEventListener('click',toggleMusic);

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
detectSess();
buildSlides();
goTo(0);
</script>
</body>
</html>
