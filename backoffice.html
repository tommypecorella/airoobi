<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#000;--white:#FFF;--gold:#B8960C;
  --gray-900:#0d0d0d;--gray-800:#1a1a1a;--gray-700:#2a2a2a;--gray-600:#3a3a3a;
  --gray-400:#888;--gray-300:#aaa;
  --aria:#4A9EFF;--kas:#49EACB;--red:#ff6b6b;--orange:#f0a030;
  --font-h:'Cormorant Garamond',Georgia,serif;
  --font-b:'Instrument Sans',system-ui,sans-serif;
  --font-m:'DM Mono',monospace;
}
html{background:var(--black)}
body{font-family:var(--font-b);color:var(--white);background:var(--black);-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--gray-700);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{height:22px;opacity:.9}
.topbar-badge{font-family:var(--font-m);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;background:var(--red);color:var(--white)}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-link{font-family:var(--font-m);font-size:11px;color:var(--gray-400);letter-spacing:.5px;padding:6px 12px;border:1px solid var(--gray-700);transition:all .2s}
.topbar-link:hover{border-color:var(--gold);color:var(--gold)}

/* ── MAIN ── */
.main{max-width:1100px;margin:0 auto;padding:32px 20px 100px}

/* ── PAGE TITLE ── */
.page-title{font-family:var(--font-h);font-size:clamp(26px,5vw,36px);font-weight:300;margin-bottom:6px}
.page-title em{color:var(--gold);font-style:italic}
.page-sub{font-size:13px;color:var(--gray-400);margin-bottom:32px}

/* ── STATUS TABS ── */
.bo-tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--gray-700);overflow-x:auto}
.bo-tab{padding:12px 20px;background:none;border:none;color:var(--gray-400);font-family:var(--font-m);font-size:11px;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;position:relative}
.bo-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.bo-tab:hover{color:var(--white)}
.bo-tab-count{font-size:9px;background:var(--gray-700);color:var(--gray-300);padding:1px 6px;border-radius:8px;margin-left:6px;vertical-align:middle}
.bo-tab.active .bo-tab-count{background:var(--gold);color:var(--black)}
.bo-tab-count.alert{background:var(--red);color:var(--white)}

/* ── TABLE ── */
.bo-table{width:100%;border-collapse:collapse;margin-bottom:24px}
.bo-table th{font-family:var(--font-m);font-size:9px;color:var(--gray-400);letter-spacing:1.5px;text-transform:uppercase;text-align:left;padding:10px 12px;border-bottom:1px solid var(--gray-700);white-space:nowrap}
.bo-table td{padding:12px;border-bottom:1px solid var(--gray-700);font-size:13px;vertical-align:middle}
.bo-table tr:hover td{background:var(--gray-900)}
.bo-table .mono{font-family:var(--font-m);font-size:11px}
.bo-table .truncate{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── STATUS BADGES ── */
.status{font-family:var(--font-m);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;display:inline-block;white-space:nowrap}
.status.in_valutazione{background:var(--orange);color:var(--black)}
.status.presale{background:var(--aria);color:var(--black)}
.status.sale{background:var(--gold);color:var(--black)}
.status.dropped{background:var(--kas);color:var(--black)}
.status.rifiutato_min500,.status.rifiutato_generico{background:var(--red);color:var(--white)}
.status.draft{background:var(--gray-700);color:var(--gray-300)}
.status.closed,.status.completed{background:var(--gray-600);color:var(--gray-300)}

/* ── ACTION BUTTONS ── */
.bo-actions{display:flex;gap:6px;flex-wrap:wrap}
.bo-btn{font-family:var(--font-m);font-size:10px;letter-spacing:.5px;padding:6px 12px;border:1px solid var(--gray-700);background:none;color:var(--gray-400);transition:all .2s}
.bo-btn:hover{border-color:var(--gold);color:var(--gold)}
.bo-btn.approve{border-color:var(--kas);color:var(--kas)}
.bo-btn.approve:hover{background:var(--kas);color:var(--black)}
.bo-btn.reject{border-color:var(--red);color:var(--red)}
.bo-btn.reject:hover{background:var(--red);color:var(--white)}
.bo-btn.view{border-color:var(--aria);color:var(--aria)}
.bo-btn.view:hover{background:var(--aria);color:var(--black)}
.bo-btn:disabled{opacity:.3;cursor:not-allowed}

/* ── EMPTY STATE ── */
.bo-empty{text-align:center;padding:60px 24px;color:var(--gray-400);font-size:14px}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:center;justify-content:center;padding:16px}
.modal-bg.active{display:flex}
.modal{background:var(--gray-900);border:1px solid var(--gray-700);max-width:500px;width:100%;padding:32px 24px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.modal h3{font-family:var(--font-h);font-size:24px;font-weight:300;margin-bottom:16px}
.modal h3 em{color:var(--gold);font-style:italic}
.modal-field{margin-bottom:16px}
.modal-label{display:block;font-family:var(--font-m);font-size:10px;color:var(--gray-400);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.modal-input,.modal-select,.modal-textarea{width:100%;padding:10px 12px;background:var(--gray-800);border:1px solid var(--gray-700);color:var(--white);font-size:14px}
.modal-input:focus,.modal-select:focus,.modal-textarea:focus{outline:none;border-color:var(--gold)}
.modal-textarea{min-height:80px;resize:vertical}
.modal-select{appearance:none;-webkit-appearance:none}
.modal-row{display:flex;gap:12px}
.modal-row .modal-field{flex:1}
.modal-info{font-size:12px;color:var(--gray-400);margin-bottom:16px;line-height:1.6;padding:12px;border:1px solid var(--gray-700)}
.modal-info strong{color:var(--white)}
.modal-actions{display:flex;gap:12px;margin-top:20px}
.modal-actions button{flex:1;padding:14px;border:none;font-family:var(--font-m);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s}
.modal-cancel{background:var(--gray-800);color:var(--gray-400);border:1px solid var(--gray-700)!important;cursor:pointer}
.modal-cancel:hover{border-color:var(--white)!important;color:var(--white)}
.modal-confirm{background:var(--kas);color:var(--black);cursor:pointer}
.modal-confirm:hover{background:var(--white)}
.modal-confirm.reject{background:var(--red);color:var(--white)}
.modal-confirm.reject:hover{background:var(--white);color:var(--red)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gray-800);border:1px solid var(--gold);padding:12px 24px;z-index:999;font-family:var(--font-m);font-size:12px;color:var(--gold);text-align:center;transition:transform .3s ease;max-width:90vw;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── DETAIL PANEL ── */
.detail-panel{display:none;border:1px solid var(--gray-700);background:var(--gray-900);padding:24px;margin-bottom:24px;animation:fadeIn .2s ease}
.detail-panel.active{display:block}
.detail-panel-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.detail-panel-title{font-family:var(--font-h);font-size:22px;font-weight:300}
.detail-panel-close{background:none;border:none;color:var(--gray-400);font-size:18px;cursor:pointer;padding:4px 8px}
.detail-panel-close:hover{color:var(--white)}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.detail-item{padding:10px;border:1px solid var(--gray-700)}
.detail-item-label{font-family:var(--font-m);font-size:9px;color:var(--gray-400);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.detail-item-val{font-size:14px}
.detail-desc{font-size:13px;color:var(--gray-300);line-height:1.6;margin-bottom:16px}
.detail-img{max-width:200px;max-height:200px;object-fit:contain;border:1px solid var(--gray-700);margin-bottom:16px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .bo-table{font-size:12px}
  .bo-table th,.bo-table td{padding:8px 6px}
  .hide-mobile{display:none}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <a href="https://airoobi.com"><img src="/public/images/AIROOBI_Logo_White.png" class="topbar-logo" alt="AIROOBI"></a>

<!-- MAIN -->
<div class="main">

  <h1 class="page-title">Gestione <em>Airdrop</em></h1>
  <p class="page-sub">Valutazioni, approvazioni e stato di tutti gli airdrop</p>

  <!-- STATUS TABS -->
  <div class="bo-tabs" id="bo-tabs">
    <button class="bo-tab active" data-status="in_valutazione" onclick="filterStatus('in_valutazione')">In valutazione <span class="bo-tab-count alert" id="count-in_valutazione">0</span></button>
    <button class="bo-tab" data-status="presale" onclick="filterStatus('presale')">Presale <span class="bo-tab-count" id="count-presale">0</span></button>
    <button class="bo-tab" data-status="sale" onclick="filterStatus('sale')">Sale <span class="bo-tab-count" id="count-sale">0</span></button>
    <button class="bo-tab" data-status="rifiutato" onclick="filterStatus('rifiutato')">Rifiutati <span class="bo-tab-count" id="count-rifiutato">0</span></button>
    <button class="bo-tab" data-status="all" onclick="filterStatus('all')">Tutti <span class="bo-tab-count" id="count-all">0</span></button>
  </div>

  <!-- DETAIL PANEL (shown when viewing an item) -->
  <div class="detail-panel" id="detail-panel"></div>

  <!-- TABLE -->
  <div id="table-wrap"></div>

</div>

<!-- APPROVE MODAL -->
<div class="modal-bg" id="approve-modal" onclick="if(event.target===this)closeModals()">
  <div class="modal">
    <h3>Approva <em id="approve-title"></em></h3>
    <div class="modal-info" id="approve-info"></div>
    <div class="modal-row">
      <div class="modal-field">
        <label class="modal-label">Prezzo blocco (ARIA)</label>
        <input class="modal-input" id="approve-price" type="number" min="1" placeholder="20">
      </div>
      <div class="modal-field">
        <label class="modal-label">Blocchi totali</label>
        <input class="modal-input" id="approve-blocks" type="number" min="10" placeholder="500">
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <label class="modal-label">Presale price (opzionale)</label>
        <input class="modal-input" id="approve-presale" type="number" min="1" placeholder="— nessuno">
      </div>
      <div class="modal-field">
        <label class="modal-label">Status iniziale</label>
        <select class="modal-select" id="approve-status">
          <option value="presale">Presale</option>
          <option value="sale">Sale (live)</option>
        </select>
      </div>
    </div>
    <div class="modal-field">
      <label class="modal-label">Deadline (opzionale)</label>
      <input class="modal-input" id="approve-deadline" type="date">
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModals()">Annulla</button>
      <button class="modal-confirm" id="approve-ok" onclick="doApprove()">Approva</button>
    </div>
  </div>
</div>

<!-- REJECT MODAL -->
<div class="modal-bg" id="reject-modal" onclick="if(event.target===this)closeModals()">
  <div class="modal">
    <h3>Rifiuta <em id="reject-title"></em></h3>
    <div class="modal-field">
      <label class="modal-label">Motivo rifiuto</label>
      <select class="modal-select" id="reject-reason">
        <option value="rifiutato_min500">Valore sotto €500</option>
        <option value="rifiutato_generico">Rifiuto generico</option>
      </select>
    </div>
    <div class="modal-field">
      <label class="modal-label">Note (opzionale)</label>
      <textarea class="modal-textarea" id="reject-note" placeholder="Motivo dettagliato..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModals()">Annulla</button>
      <button class="modal-confirm reject" id="reject-ok" onclick="doReject()">Rifiuta</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
var SB_URL='https://vuvlmlpuhovipfwtquux.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1dmxtbHB1aG92aXBmd3RxdXV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NjM0MjEsImV4cCI6MjA4ODIzOTQyMX0.5iEqns2F7N6h1VVxLJjqu3Rm4doOVDs5hpD8sNaL6co';
var ADMIN_EMAILS=['tommaso.pecorella+ceo@outlook.com','ceo@airoobi.com'];

var _session=null;
var _airdrops=[];
var _currentStatus='in_valutazione';
var _actionTarget=null; // airdrop being approved/rejected

// ── Session ──
function getSession(){try{return JSON.parse(localStorage.getItem('airoobi_session'))}catch(e){return null}}
function doLogout(){localStorage.removeItem('airoobi_session');window.location.href='https://airoobi.com';}

function requireAdmin(){
  _session=getSession();
  if(!_session){window.location.href='https://airoobi.com/#login';return false;}
  var email=_session.user?.email||'';
  if(!ADMIN_EMAILS.includes(email)){
    document.body.innerHTML='<div style="text-align:center;padding:100px;color:#ff6b6b;font-family:monospace">ACCESSO NEGATO<br><br><a href="https://airoobi.com" style="color:#888">Torna alla home</a></div>';
    return false;
  }
  return true;
}

// ── Token ──
async function refreshToken(){
  if(!_session||!_session.refresh_token)return false;
  try{
    var res=await fetch(SB_URL+'/auth/v1/token?grant_type=refresh_token',{
      method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({refresh_token:_session.refresh_token})
    });
    if(!res.ok)return false;
    var data=await res.json();
    _session.access_token=data.access_token;
    _session.refresh_token=data.refresh_token;
    localStorage.setItem('airoobi_session',JSON.stringify(_session));
    return true;
  }catch(e){return false}
}
async function getValidToken(){
  try{
    var payload=JSON.parse(atob(_session.access_token.split('.')[1]));
    if(payload.exp*1000<Date.now()+60000){
      if(!await refreshToken()){window.location.href='https://airoobi.com/#login';return null;}
    }
  }catch(e){}
  return _session.access_token;
}

// ── Supabase helpers ──
async function sbGet(path,token){
  var h={'apikey':SB_KEY,'Authorization':'Bearer '+token};
  var res=await fetch(SB_URL+'/rest/v1/'+path,{headers:h});
  return res.ok?await res.json():[];
}
async function sbPatch(path,body,token){
  var res=await fetch(SB_URL+'/rest/v1/'+path,{
    method:'PATCH',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(body)
  });
  return {ok:res.ok,data:res.ok?await res.json():null,error:res.ok?null:await res.text()};
}

// ── Init ──
document.addEventListener('DOMContentLoaded',async function(){
  if(!requireAdmin())return;
  await loadAirdrops();
  renderCounts();
  renderTable();
});

async function loadAirdrops(){
  var token=await getValidToken();
  if(!token)return;
  _airdrops=await sbGet('airdrops?select=*&order=created_at.desc',token)||[];
}

// ── Filter ──
function filterStatus(status){
  _currentStatus=status;
  document.querySelectorAll('.bo-tab').forEach(function(t){
    t.classList.toggle('active',t.getAttribute('data-status')===status);
  });
  closeDetail();
  renderTable();
}

function getFiltered(){
  if(_currentStatus==='all')return _airdrops;
  if(_currentStatus==='rifiutato')return _airdrops.filter(function(a){return a.status==='rifiutato_min500'||a.status==='rifiutato_generico'});
  return _airdrops.filter(function(a){return a.status===_currentStatus});
}

// ── Counts ──
function renderCounts(){
  var counts={in_valutazione:0,presale:0,sale:0,rifiutato:0,all:_airdrops.length};
  _airdrops.forEach(function(a){
    if(a.status==='in_valutazione')counts.in_valutazione++;
    else if(a.status==='presale')counts.presale++;
    else if(a.status==='sale')counts.sale++;
    else if(a.status==='rifiutato_min500'||a.status==='rifiutato_generico')counts.rifiutato++;
  });
  Object.keys(counts).forEach(function(k){
    var el=document.getElementById('count-'+k);
    if(el)el.textContent=counts[k];
  });
}

// ── Table ──
function renderTable(){
  var list=getFiltered();
  var wrap=document.getElementById('table-wrap');

  if(!list.length){
    wrap.innerHTML='<div class="bo-empty">Nessun airdrop in questa sezione</div>';
    return;
  }

  var isValutazione=_currentStatus==='in_valutazione';

  var html='<table class="bo-table"><thead><tr>'
    +'<th>Oggetto</th>'
    +'<th>Categoria</th>'
    +'<th>Valore €</th>'
    +'<th class="hide-mobile">Status</th>'
    +'<th class="hide-mobile">Blocchi</th>'
    +'<th class="hide-mobile">Data</th>'
    +'<th>Azioni</th>'
    +'</tr></thead><tbody>';

  list.forEach(function(a){
    var date=new Date(a.created_at).toLocaleDateString('it-IT',{day:'2-digit',month:'short'});
    var blocksInfo=a.total_blocks>0?(a.blocks_sold+'/'+a.total_blocks):'—';
    var catLabels={mobile:'Mobile',tech:'Tech',luxury:'Luxury',ultra_luxury:'Ultra Luxury'};

    html+='<tr>'
      +'<td class="truncate" title="'+a.title+'">'+a.title+'</td>'
      +'<td class="mono">'+(catLabels[a.category]||a.category)+'</td>'
      +'<td class="mono">€'+Number(a.object_value_eur).toLocaleString('it-IT')+'</td>'
      +'<td class="hide-mobile"><span class="status '+a.status+'">'+a.status.replace(/_/g,' ')+'</span></td>'
      +'<td class="mono hide-mobile">'+blocksInfo+'</td>'
      +'<td class="mono hide-mobile">'+date+'</td>'
      +'<td><div class="bo-actions">'
      +'<button class="bo-btn view" onclick="viewDetail(\''+a.id+'\')">Dettagli</button>';

    if(a.status==='in_valutazione'){
      html+='<button class="bo-btn approve" onclick="openApprove(\''+a.id+'\')">Approva</button>'
        +'<button class="bo-btn reject" onclick="openReject(\''+a.id+'\')">Rifiuta</button>';
    }

    html+='</div></td></tr>';
  });

  html+='</tbody></table>';
  wrap.innerHTML=html;
}

// ── Detail panel ──
function viewDetail(id){
  var a=_airdrops.find(function(x){return x.id===id});
  if(!a)return;

  var panel=document.getElementById('detail-panel');
  var date=new Date(a.created_at).toLocaleString('it-IT');
  var dl=a.deadline?new Date(a.deadline).toLocaleDateString('it-IT'):'—';
  var pi=a.product_info||{};

  var html='<div class="detail-panel-header">'
    +'<div class="detail-panel-title">'+a.title+' <span class="status '+a.status+'">'+a.status.replace(/_/g,' ')+'</span></div>'
    +'<button class="detail-panel-close" onclick="closeDetail()">&times;</button>'
    +'</div>';

  if(a.image_url)html+='<img class="detail-img" src="'+a.image_url+'" alt="">';

  if(a.description)html+='<div class="detail-desc">'+a.description+'</div>';

  html+='<div class="detail-grid">'
    +'<div class="detail-item"><div class="detail-item-label">ID</div><div class="detail-item-val mono" style="font-size:10px">'+a.id+'</div></div>'
    +'<div class="detail-item"><div class="detail-item-label">Categoria</div><div class="detail-item-val">'+a.category+'</div></div>'
    +'<div class="detail-item"><div class="detail-item-label">Valore EUR</div><div class="detail-item-val" style="color:var(--gold)">€'+Number(a.object_value_eur).toLocaleString('it-IT')+'</div></div>'
    +'<div class="detail-item"><div class="detail-item-label">Prezzo blocco</div><div class="detail-item-val" style="color:var(--aria)">'+(a.block_price_aria||'—')+' ARIA</div></div>'
    +'<div class="detail-item"><div class="detail-item-label">Blocchi</div><div class="detail-item-val">'+(a.total_blocks>0?a.blocks_sold+' / '+a.total_blocks:'—')+'</div></div>'
    +'<div class="detail-item"><div class="detail-item-label">Presale price</div><div class="detail-item-val">'+(a.presale_block_price||'—')+'</div></div>'
    +'<div class="detail-item"><div class="detail-item-label">Deadline</div><div class="detail-item-val">'+dl+'</div></div>'
    +'<div class="detail-item"><div class="detail-item-label">Creato</div><div class="detail-item-val">'+date+'</div></div>'
    +'<div class="detail-item"><div class="detail-item-label">Submitted by</div><div class="detail-item-val mono" style="font-size:10px">'+(a.submitted_by||a.created_by||'admin')+'</div></div>';

  if(a.rejection_reason)html+='<div class="detail-item"><div class="detail-item-label">Motivo rifiuto</div><div class="detail-item-val" style="color:var(--red)">'+a.rejection_reason+'</div></div>';

  html+='</div>';

  // Product info
  if(pi.brand||pi.model||pi.condition){
    html+='<div class="detail-grid">';
    if(pi.brand)html+='<div class="detail-item"><div class="detail-item-label">Brand</div><div class="detail-item-val">'+pi.brand+'</div></div>';
    if(pi.model)html+='<div class="detail-item"><div class="detail-item-label">Modello</div><div class="detail-item-val">'+pi.model+'</div></div>';
    if(pi.condition)html+='<div class="detail-item"><div class="detail-item-label">Condizione</div><div class="detail-item-val">'+pi.condition+'</div></div>';
    html+='</div>';
  }

  // Actions
  if(a.status==='in_valutazione'){
    html+='<div class="bo-actions" style="margin-top:16px">'
      +'<button class="bo-btn approve" onclick="openApprove(\''+a.id+'\')">Approva</button>'
      +'<button class="bo-btn reject" onclick="openReject(\''+a.id+'\')">Rifiuta</button>'
      +'</div>';
  }

  panel.innerHTML=html;
  panel.classList.add('active');
  panel.scrollIntoView({behavior:'smooth',block:'start'});
}

function closeDetail(){
  var p=document.getElementById('detail-panel');
  p.classList.remove('active');
  p.innerHTML='';
}

// ── Approve ──
function openApprove(id){
  var a=_airdrops.find(function(x){return x.id===id});
  if(!a)return;
  _actionTarget=a;
  document.getElementById('approve-title').textContent=a.title;

  // Suggest values based on object_value_eur (ARIA = €0.20)
  var val=Number(a.object_value_eur);
  var suggestedBlocks=Math.round(val/4)*2; // ~revenue = 1.4x value
  var suggestedPrice=Math.round(val*1.43/suggestedBlocks);
  if(suggestedPrice<1)suggestedPrice=1;
  if(suggestedBlocks<10)suggestedBlocks=10;

  document.getElementById('approve-info').innerHTML=
    '<strong>'+a.title+'</strong><br>'
    +'Categoria: '+a.category+' &middot; Valore dichiarato: <strong>€'+val.toLocaleString('it-IT')+'</strong><br>'
    +'Suggerimento: ~'+suggestedBlocks+' blocchi × '+suggestedPrice+' ARIA = €'+(suggestedBlocks*suggestedPrice*0.20).toLocaleString('it-IT')+' revenue';

  document.getElementById('approve-price').value=suggestedPrice;
  document.getElementById('approve-blocks').value=suggestedBlocks;
  document.getElementById('approve-presale').value='';
  document.getElementById('approve-deadline').value='';
  document.getElementById('approve-status').value='presale';
  document.getElementById('approve-modal').classList.add('active');
}

async function doApprove(){
  if(!_actionTarget)return;
  var price=parseInt(document.getElementById('approve-price').value);
  var blocks=parseInt(document.getElementById('approve-blocks').value);
  var presale=document.getElementById('approve-presale').value?parseInt(document.getElementById('approve-presale').value):null;
  var status=document.getElementById('approve-status').value;
  var deadline=document.getElementById('approve-deadline').value||null;

  if(!price||price<1||!blocks||blocks<1){
    alert('Prezzo e blocchi obbligatori (min 1)');return;
  }

  var btn=document.getElementById('approve-ok');
  btn.disabled=true;btn.textContent='...';

  var token=await getValidToken();
  var body={
    block_price_aria:price,
    total_blocks:blocks,
    blocks_sold:0,
    status:status
  };
  if(presale)body.presale_block_price=presale;
  if(deadline)body.deadline=deadline+'T23:59:59Z';

  var res=await sbPatch('airdrops?id=eq.'+_actionTarget.id,body,token);
  btn.disabled=false;btn.textContent='Approva';

  if(res.ok){
    closeModals();
    showToast('Approvato: '+_actionTarget.title);
    await loadAirdrops();
    renderCounts();
    renderTable();
    closeDetail();
  } else {
    alert('Errore: '+res.error);
  }
}

// ── Reject ──
function openReject(id){
  var a=_airdrops.find(function(x){return x.id===id});
  if(!a)return;
  _actionTarget=a;
  document.getElementById('reject-title').textContent=a.title;
  document.getElementById('reject-reason').value='rifiutato_generico';
  document.getElementById('reject-note').value='';
  document.getElementById('reject-modal').classList.add('active');
}

async function doReject(){
  if(!_actionTarget)return;
  var reason=document.getElementById('reject-reason').value;
  var note=document.getElementById('reject-note').value.trim();

  var btn=document.getElementById('reject-ok');
  btn.disabled=true;btn.textContent='...';

  var token=await getValidToken();
  var body={status:reason};
  if(note)body.rejection_reason=note;

  var res=await sbPatch('airdrops?id=eq.'+_actionTarget.id,body,token);
  btn.disabled=false;btn.textContent='Rifiuta';

  if(res.ok){
    closeModals();
    showToast('Rifiutato: '+_actionTarget.title);
    await loadAirdrops();
    renderCounts();
    renderTable();
    closeDetail();
  } else {
    alert('Errore: '+res.error);
  }
}

// ── Modals ──
function closeModals(){
  document.getElementById('approve-modal').classList.remove('active');
  document.getElementById('reject-modal').classList.remove('active');
  _actionTarget=null;
}

// ── Toast ──
function showToast(text){
  var t=document.getElementById('toast');
  t.textContent=text;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},3000);
}
</script>
</body>
</html>
