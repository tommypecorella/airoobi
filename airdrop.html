<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#060b18;--white:#f0f2f8;--gold:#B8960C;--accent:#4A9EFF;--aria:#4A9EFF;--kas:#49EACB;--gray-300:#b4bdd4;--gray-400:#8892ae;--gray-500:#6b7394;--gray-600:#4a5270;--gray-700:#1f2942;--gray-800:#151d33;--gray-900:#0d1322;--red:#ef4444;--font-h:'Cormorant Garamond',Georgia,serif;--font-b:'Instrument Sans','Helvetica Neue',sans-serif;--font-m:'DM Mono','Courier New',monospace;--radius:14px;--radius-sm:10px;--card-bg:rgba(12,18,36,.6)}
html{background:var(--black);color:var(--white);font-family:var(--font-b);-webkit-font-smoothing:antialiased;color-scheme:dark}
body{min-height:100vh;background:var(--black)}
.it{display:none}.en{display:none}
html[data-lang="it"] .it{display:inline}
html[data-lang="en"] .en{display:inline}
html:not([data-lang]) .it{display:inline}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:rgba(6,11,24,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06)}
.topbar-logo{font-family:var(--font-b);font-size:22px;font-weight:700;letter-spacing:-2px;color:var(--accent);opacity:.8;text-decoration:none}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-btn{background:none;border:1px solid var(--gray-700);color:var(--gray-400);padding:8px 18px;font-family:var(--font-m);font-size:10px;letter-spacing:1.5px;cursor:pointer;transition:all .25s;text-decoration:none;border-radius:var(--radius-sm)}
.topbar-btn:hover{border-color:var(--accent);color:var(--accent)}
.topbar-btn-gold{border-color:rgba(184,150,12,.4);color:var(--gold)}
.topbar-btn-gold:hover{border-color:var(--gold);background:rgba(184,150,12,.08)}

/* ── PRODUCT PAGE ── */
.product-page{max-width:1100px;margin:0 auto;padding:24px 20px 80px}
.product-back{display:inline-flex;align-items:center;gap:8px;color:var(--gray-400);font-size:13px;text-decoration:none;margin-bottom:24px;transition:color .25s;font-family:var(--font-b)}
.product-back:hover{color:var(--accent)}

.product-layout{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start}
@media(max-width:768px){.product-layout{grid-template-columns:1fr;gap:24px}}

/* Left: image */
.product-gallery{position:sticky;top:80px}
.product-gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--radius);border:1px solid rgba(255,255,255,.06);background:var(--gray-900)}
.product-gallery-placeholder{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--gray-900);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);color:var(--gray-600)}
.product-gallery-placeholder svg{width:64px;height:64px;stroke:currentColor;fill:none;stroke-width:1}

/* Right: info */
.product-cat{font-family:var(--font-m);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray-500);margin-bottom:8px}
.product-title{font-family:var(--font-h);font-size:clamp(28px,4vw,40px);font-weight:300;line-height:1.15;margin-bottom:6px}
.product-brand{font-family:var(--font-m);font-size:11px;letter-spacing:1.5px;color:var(--gray-400);margin-bottom:16px}
.product-status{display:inline-block;font-family:var(--font-m);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:20px}
.product-status-presale{background:rgba(74,158,255,.1);color:var(--aria);border:1px solid rgba(74,158,255,.25)}
.product-status-sale{background:rgba(73,234,203,.08);color:var(--kas);border:1px solid rgba(73,234,203,.2)}

/* Price block */
.price-block{padding:20px;border:1px solid rgba(184,150,12,.2);background:rgba(184,150,12,.03);border-radius:var(--radius);margin-bottom:24px}
.price-main{font-family:var(--font-h);font-size:36px;font-weight:400;color:var(--gold);margin-bottom:4px}
.price-sub{font-size:13px;color:var(--gray-400)}
.price-presale{margin-top:8px;padding:8px 12px;background:rgba(74,158,255,.06);border:1px solid rgba(74,158,255,.2);font-size:12px;color:var(--aria);border-radius:var(--radius-sm)}

/* Progress */
.progress-section{margin-bottom:24px}
.progress-bar-wrap{height:6px;background:var(--gray-800);border-radius:3px;overflow:hidden;margin-bottom:8px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--kas));border-radius:3px;transition:width .5s}
.progress-stats{display:flex;justify-content:space-between;font-family:var(--font-m);font-size:11px;color:var(--gray-400);letter-spacing:.5px}

/* Buy section */
.buy-section{padding:20px;border:1px solid rgba(255,255,255,.07);background:var(--card-bg);border-radius:var(--radius);margin-bottom:24px}
.buy-title{font-family:var(--font-m);font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:16px}
.buy-qty{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.buy-qty button{width:36px;height:36px;background:var(--gray-800);border:1px solid var(--gray-700);color:var(--white);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;border-radius:var(--radius-sm)}
.buy-qty button:hover{border-color:var(--accent);color:var(--accent)}
.buy-qty input{width:60px;text-align:center;background:var(--gray-900);border:1px solid var(--gray-700);color:var(--white);font-family:var(--font-m);font-size:16px;padding:6px;border-radius:var(--radius-sm)}
.buy-cost{font-size:13px;color:var(--gray-300);margin-bottom:16px}
.buy-btn{width:100%;padding:16px;background:var(--gold);color:var(--black);border:none;font-family:var(--font-b);font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .3s;border-radius:var(--radius-sm)}
.buy-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(184,150,12,.3)}
.buy-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.buy-login{text-align:center;padding:16px;border:1px dashed var(--gray-700);border-radius:var(--radius);color:var(--gray-400);font-size:13px}
.buy-login a{color:var(--accent);text-decoration:none}

/* Details grid */
.details-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
@media(max-width:480px){.details-grid{grid-template-columns:1fr}}
.detail-card{padding:14px 16px;border:1px solid rgba(255,255,255,.06);background:var(--card-bg);border-radius:var(--radius-sm)}
.detail-card-label{font-family:var(--font-m);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray-500);margin-bottom:4px}
.detail-card-val{font-size:16px;font-weight:600;color:var(--white)}

/* Description */
.desc-section{margin-bottom:24px}
.desc-section h3{font-family:var(--font-h);font-size:20px;font-weight:400;margin-bottom:12px;color:var(--white)}
.desc-section p{font-size:14px;line-height:1.7;color:var(--gray-300)}
.desc-section ul{list-style:none;padding:0}
.desc-section ul li{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;color:var(--gray-300);display:flex;align-items:center;gap:8px}
.desc-section ul li::before{content:'';width:4px;height:4px;background:var(--gold);border-radius:50%;flex-shrink:0}

/* Chat */
.chat-section{margin-top:32px;padding:20px;border:1px solid rgba(255,255,255,.07);background:var(--card-bg);border-radius:var(--radius)}
.chat-title{font-family:var(--font-m);font-size:10px;letter-spacing:2px;color:var(--gray-400);text-transform:uppercase;margin-bottom:12px}

/* Footer */
.ap-footer{text-align:center;padding:40px 20px;border-top:1px solid rgba(255,255,255,.04);margin-top:60px;font-size:11px;color:var(--gray-500)}
.ap-footer a{color:var(--gray-400);text-decoration:none}

/* Loading */
.ap-loading{display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--gray-500);font-family:var(--font-m);font-size:12px;letter-spacing:2px}
.ap-error{text-align:center;padding:80px 20px;color:var(--gray-400)}
.ap-error h2{font-family:var(--font-h);font-size:28px;font-weight:300;margin-bottom:12px;color:var(--white)}
</style>
</head>

<script>
var SB_URL='https://vuvlmlpuhovipfwtquux.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1dmxtbHB1aG92aXBmd3RxdXV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NjM0MjEsImV4cCI6MjA4ODIzOTQyMX0.5iEqns2F7N6h1VVxLJjqu3Rm4doOVDs5hpD8sNaL6co';

function getSession(){try{return JSON.parse(localStorage.getItem('airoobi_session'))}catch(e){return null}}
function escH(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';}

// Lang
(function(){
  var saved=localStorage.getItem('airoobi_lang');
  if(saved)document.documentElement.setAttribute('data-lang',saved);
})();

// Get airdrop ID from URL
var _airdropId=(function(){
  var parts=location.pathname.split('/');
  return parts[parts.length-1]||parts[parts.length-2]||null;
})();

var _airdrop=null;
var _session=getSession();
var _balance=0;
var _buyQty=1;
var _robiPrice=0; // prezzo ROBI corrente (treasury/circolanti × 0.999)
var ARIA_EUR=0.10;
var SPLIT_FONDO=0.22;

// Update login button
if(_session&&_session.user){
  var btn=document.getElementById('ap-login-btn');
  if(btn){btn.textContent='APP';btn.href='/airdrops';}
}

async function getValidToken(){
  if(!_session||!_session.access_token)return null;
  try{
    var payload=JSON.parse(atob(_session.access_token.split('.')[1]));
    if(payload.exp*1000>Date.now()+60000)return _session.access_token;
    // Refresh
    var res=await fetch(SB_URL+'/auth/v1/token?grant_type=refresh_token',{
      method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({refresh_token:_session.refresh_token})
    });
    if(res.ok){var d=await res.json();_session.access_token=d.access_token;_session.refresh_token=d.refresh_token;localStorage.setItem('airoobi_session',JSON.stringify(_session));return d.access_token;}
  }catch(e){}
  return _session?_session.access_token:null;
}

async function loadAirdrop(){
  if(!_airdropId){showError();return;}
  try{
    var res=await fetch(SB_URL+'/rest/v1/airdrops?id=eq.'+_airdropId+'&select=*',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    if(!res.ok){showError();return;}
    var rows=await res.json();
    if(!rows||rows.length===0){showError();return;}
    _airdrop=rows[0];

    // Update meta
    document.title=_airdrop.title+' — AIROOBI Airdrop';
    var metaDesc=document.querySelector('meta[name="description"]');
    if(metaDesc)metaDesc.setAttribute('content','Partecipa all\'airdrop "'+_airdrop.title+'" su AIROOBI. Compra blocchi con ARIA e guadagna ROBI.');
    var ogTitle=document.querySelector('meta[property="og:title"]');
    if(ogTitle)ogTitle.setAttribute('content',_airdrop.title+' — AIROOBI Airdrop');

    // Load balance + treasury in parallelo
    var tokenForLoad=_session&&_session.user?await getValidToken():null;
    await Promise.all([
      // Balance
      (tokenForLoad?(async function(){
        try{
          var pRes=await fetch(SB_URL+'/rest/v1/profiles?id=eq.'+_session.user.id+'&select=total_points',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+tokenForLoad}});
          if(pRes.ok){var pr=await pRes.json();if(pr&&pr[0])_balance=pr[0].total_points||0;}
        }catch(e){}
      })():Promise.resolve()),
      // Treasury + ROBI circolanti per calcolo mining
      (async function(){
        try{
          var tfRes=await fetch(SB_URL+'/rest/v1/treasury_funds?select=amount_eur,treasury_pct',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
          var treasuryBal=0;
          if(tfRes.ok){var tf=await tfRes.json();if(tf)tf.forEach(function(r){var a=parseFloat(r.amount_eur)||0;var p=r.treasury_pct!=null?parseInt(r.treasury_pct):100;treasuryBal+=a*(p/100);});}
          var robiRes=await fetch(SB_URL+'/rest/v1/rpc/admin_get_all_robi',{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}});
          var totalRobi=0;
          if(robiRes.ok){var rd=await robiRes.json();rd.forEach(function(r){totalRobi+=parseFloat(r.shares)||0;});}
          if(totalRobi>0&&treasuryBal>0)_robiPrice=(treasuryBal*0.999)/totalRobi;
        }catch(e){}
      })()
    ]);

    render();
  }catch(e){console.error(e);showError();}
}

function showError(){
  document.getElementById('ap-page').innerHTML=
    '<div class="ap-error">'
    +'<h2>Airdrop non trovato</h2>'
    +'<p style="margin-bottom:24px"><span class="it">L\'airdrop richiesto non esiste o non è disponibile.</span><span class="en">The requested airdrop does not exist or is not available.</span></p>'
    +'<a href="/airdrops" class="topbar-btn" style="display:inline-block"><span class="it">Torna agli airdrop</span><span class="en">Back to airdrops</span></a>'
    +'</div>';
}

function calcMiningRate(a){
  // Treasury-based: quanti blocchi servono per 1 ROBI
  // treasury_previsto = total_blocks × block_price × ARIA_EUR × SPLIT_FONDO
  // max_robi = treasury_previsto / prezzo_robi
  // rate = ceil(total_blocks / max_robi)
  if(_robiPrice>0&&a.total_blocks>0&&a.block_price_aria>0){
    var treasuryPrevisto=a.total_blocks*a.block_price_aria*ARIA_EUR*SPLIT_FONDO;
    var maxRobi=treasuryPrevisto/_robiPrice;
    if(maxRobi>0)return Math.max(1,Math.ceil(a.total_blocks/maxRobi));
  }
  // Fallback: formula legacy
  return Math.max(1,Math.ceil((a.object_value_eur||500)/100));
}

function render(){
  var a=_airdrop;
  var isPresale=a.status==='presale';
  var remaining=a.total_blocks-a.blocks_sold;
  var pct=a.total_blocks>0?Math.round(a.blocks_sold/a.total_blocks*100):0;
  var price=isPresale&&a.presale_block_price?a.presale_block_price:a.block_price_aria;
  var pi=a.product_info||{};
  var highlights=pi.highlights||[];
  var included=pi.whats_included||[];
  var lang=document.documentElement.getAttribute('data-lang')||'it';

  // Status badge
  var statusHtml='';
  if(a.status==='presale')statusHtml='<div class="product-status product-status-presale">Presale · 2x Mining</div>';
  else if(a.status==='sale')statusHtml='<div class="product-status product-status-sale">Live</div>';

  // Image
  var imgHtml=a.image_url
    ?'<img src="'+a.image_url+'" alt="'+escH(a.title)+'" loading="eager">'
    :'<div class="product-gallery-placeholder"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg></div>';

  // Buy section
  var buyHtml='';
  if(_session&&_session.user&&(a.status==='presale'||a.status==='sale')){
    var maxBuy=Math.min(remaining,Math.floor(_balance/price));
    buyHtml='<div class="buy-section">'
      +'<div class="buy-title"><span class="it">ACQUISTA BLOCCHI</span><span class="en">BUY BLOCKS</span></div>'
      +'<div class="buy-qty">'
      +'<button onclick="changeQty(-1)">−</button>'
      +'<input type="number" id="ap-qty" value="1" min="1" max="'+Math.max(1,maxBuy)+'" onchange="updateCost()">'
      +'<button onclick="changeQty(1)">+</button>'
      +'<span style="font-family:var(--font-m);font-size:11px;color:var(--gray-500);margin-left:8px">max '+maxBuy+'</span>'
      +'</div>'
      +'<div class="buy-cost" id="ap-cost">= '+price+' ARIA</div>'
      +'<button class="buy-btn" id="ap-buy-btn" onclick="doBuy()"'+(maxBuy<1?' disabled':'')+'>PARTECIPA</button>'
      +'</div>';
  }else if(!_session||!_session.user){
    buyHtml='<div class="buy-login"><span class="it">Per partecipare, <a href="/login?returnTo=/airdrops/'+a.id+'">accedi</a> o <a href="/signup">registrati</a>.</span><span class="en">To participate, <a href="/login?returnTo=/airdrops/'+a.id+'">log in</a> or <a href="/signup">sign up</a>.</span></div>';
  }

  // Deadline
  var dlHtml='';
  if(a.deadline){
    var dlDate=new Date(a.deadline);
    var diff=dlDate-Date.now();
    if(diff>0){
      var h=Math.floor(diff/3600000);var m=Math.floor((diff%3600000)/60000);
      var timeStr=h>=24?Math.floor(h/24)+'g '+(h%24)+'h':h+'h '+m+'m';
      dlHtml='<div class="detail-card"><div class="detail-card-label"><span class="it">Scadenza</span><span class="en">Deadline</span></div><div class="detail-card-val">'+timeStr+'</div></div>';
    }
  }

  var html=''
    +'<a href="/airdrops" class="product-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> <span class="it">Tutti gli airdrop</span><span class="en">All airdrops</span></a>'
    +'<div class="product-layout">'

    // LEFT: image
    +'<div class="product-gallery">'+imgHtml+'</div>'

    // RIGHT: info
    +'<div>'
    +'<div class="product-cat">'+escH(a.category||'')+'</div>'
    +'<h1 class="product-title">'+escH(a.title)+'</h1>'
    +(pi.brand?'<div class="product-brand">'+escH(pi.brand)+(pi.model?' · '+escH(pi.model):'')+'</div>':'')
    +statusHtml

    // Price
    +'<div class="price-block">'
    +'<div class="price-main">'+price+' ARIA <span style="font-family:var(--font-m);font-size:14px;color:var(--gray-400)"><span class="it">per blocco</span><span class="en">per block</span></span></div>'
    +(isPresale&&a.presale_block_price?'<div class="price-sub"><span style="text-decoration:line-through">'+a.block_price_aria+' ARIA</span> <span class="it">prezzo pieno</span><span class="en">full price</span></div>':'')
    +(isPresale?'<div class="price-presale"><strong>⛏ 2x MINING BOOST</strong> — <span class="it">Ogni blocco presale guadagna il doppio dei ROBI</span><span class="en">Each presale block earns double ROBI</span></div>':'')
    +'</div>'

    // Progress
    +'<div class="progress-section">'
    +'<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:'+pct+'%"></div></div>'
    +'<div class="progress-stats"><span>'+a.blocks_sold+' / '+a.total_blocks+' <span class="it">blocchi</span><span class="en">blocks</span></span><span>'+remaining+' <span class="it">rimasti</span><span class="en">left</span></span></div>'
    +'</div>'

    // Buy
    +buyHtml

    // Details grid
    +'<div class="details-grid">'
    +'<div class="detail-card"><div class="detail-card-label"><span class="it">Blocchi totali</span><span class="en">Total blocks</span></div><div class="detail-card-val">'+a.total_blocks.toLocaleString('it-IT')+'</div></div>'
    +'<div class="detail-card"><div class="detail-card-label"><span class="it">Prezzo blocco</span><span class="en">Block price</span></div><div class="detail-card-val" style="color:var(--aria)">'+a.block_price_aria+' ARIA</div></div>'
    +'<div class="detail-card"><div class="detail-card-label">Mining</div><div class="detail-card-val" style="color:var(--gold)">1 ROBI / '+calcMiningRate(a)+' bl.</div></div>'
    +dlHtml
    +'</div>'

    // Description
    +(a.description?'<div class="desc-section"><h3><span class="it">Descrizione</span><span class="en">Description</span></h3><p>'+escH(a.description)+'</p></div>':'')

    // Highlights
    +(highlights.length>0?'<div class="desc-section"><h3><span class="it">Caratteristiche</span><span class="en">Features</span></h3><ul>'+highlights.map(function(h){return '<li>'+escH(h)+'</li>'}).join('')+'</ul></div>':'')

    // What's included
    +(included.length>0?'<div class="desc-section"><h3><span class="it">Contenuto</span><span class="en">What\'s included</span></h3><ul>'+included.map(function(h){return '<li>'+escH(h)+'</li>'}).join('')+'</ul></div>':'')

    +'</div></div>'; // close layout

  document.getElementById('ap-page').innerHTML=html;
}

function changeQty(d){
  var inp=document.getElementById('ap-qty');if(!inp)return;
  var v=parseInt(inp.value)||1;
  v=Math.max(1,v+d);
  var max=parseInt(inp.max)||1;
  if(v>max)v=max;
  inp.value=v;
  _buyQty=v;
  updateCost();
}
function updateCost(){
  var inp=document.getElementById('ap-qty');if(!inp)return;
  _buyQty=parseInt(inp.value)||1;
  var price=_airdrop.status==='presale'&&_airdrop.presale_block_price?_airdrop.presale_block_price:_airdrop.block_price_aria;
  var cost=_buyQty*price;
  var el=document.getElementById('ap-cost');
  if(el)el.textContent='= '+cost+' ARIA';
  var btn=document.getElementById('ap-buy-btn');
  if(btn)btn.disabled=cost>_balance;
}

async function doBuy(){
  if(!_airdrop||_buyQty<1)return;
  var a=_airdrop;
  var isPresale=a.status==='presale';
  var price=isPresale&&a.presale_block_price?a.presale_block_price:a.block_price_aria;
  var cost=_buyQty*price;
  if(cost>_balance){alert('ARIA insufficienti');return;}

  var btn=document.getElementById('ap-buy-btn');
  if(btn)btn.disabled=true;
  var token=await getValidToken();if(!token)return;
  try{
    // Load sold blocks to find available ones
    var soldRes=await fetch(SB_URL+'/rest/v1/airdrop_blocks?airdrop_id=eq.'+a.id+'&select=block_number',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token}
    });
    var soldSet={};
    if(soldRes.ok){var sold=await soldRes.json();sold.forEach(function(b){soldSet[b.block_number]=true;});}

    // Pick random available blocks
    var available=[];
    for(var i=1;i<=a.total_blocks;i++){if(!soldSet[i])available.push(i);}
    // Shuffle
    for(var j=available.length-1;j>0;j--){
      var k=Math.floor(Math.random()*(j+1));
      var tmp=available[j];available[j]=available[k];available[k]=tmp;
    }
    var chosen=available.slice(0,_buyQty);
    if(chosen.length<_buyQty){alert('Non ci sono abbastanza blocchi disponibili');if(btn)btn.disabled=false;return;}

    var res=await fetch(SB_URL+'/rest/v1/rpc/buy_blocks',{
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify({p_airdrop_id:a.id,p_block_numbers:chosen})
    });
    var data=await res.json();
    if(data&&data.ok){
      var lang=document.documentElement.getAttribute('data-lang')||'it';
      alert((lang==='en'?'Blocks purchased!':'Blocchi acquistati!')+' '+_buyQty+(lang==='en'?' blocks':' blocchi'));
      location.reload();
    }else{
      alert('Errore: '+(data&&data.error?data.error:'sconosciuto'));
      if(btn)btn.disabled=false;
    }
  }catch(e){alert('Errore: '+e.message);if(btn)btn.disabled=false;}
}

loadAirdrop();
</script>

</html>
